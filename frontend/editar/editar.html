<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Atividades</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Editar atividade</h2>
        </div>
        <div class="content">
            <form class="form">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" name="titulo">

                <label for="conclusao">Data de conclusão prevista</label>
                <input type="date" id="conclusao" name="conclusao" placeholder="    /       /  ">

                <label for="descricao">Descrição</label>
                <textarea id="descricao" name="descricao" maxlength="304"></textarea>
                
                <div class="button-group">
                    <button type="submit" class="btn btn-aplicar">Aplicar alterações</button>
                    <button type="submit" class="btn btn-cancelar">Cancelar</button>
                </div>

            </form>
        </div>
    </div>
</body>
</html>
