<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Atividades</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Créditos</h2>
        </div>
        <div class="content">
            <form class="form">
                <div class="img-nome">
                <img src="eduarda.jpg" alt="Warda">
                <span class="nome">Eduarda Marcones dos Santos</span>
                </div>

                <div class="img-nome">
                <img src="mateus.jpg" alt="Teus">
                <span class="nome">Mateus Mariano Pereira</span>
                </div>

                <div class="img-nome">
                <img src="ari.jpg" alt="Ari">
                <span class="nome">Ari de Carvalho Nogueira</span>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-voltar">Voltar</button>
                </div>

            </form>
        </div>
    </div>
</body>
</html>
