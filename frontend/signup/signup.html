<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Atividades</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Criar conta</h2>
        </div>
        <div class="content">
            <form class="form">
                <label for="fname">Nome</label>
                <input type="text" id="fname" name="fname">

                <label for="lname">Sobrenome</label>
                <input type="text" id="lname" name="lname">

                <label for="dbirth">Data de nascimento</label>
                <input type="date" id="dbirth" name="dbirth">

                <label for="username">Nome de usuário</label>
                <input type="text" id="username" name="username">

                <label for="password">Senha</label>
                <input type="password" id="password" name="password">
                
                <div class="button-group">
                    <button type="submit" class="btn btn-voltar">Voltar</button>
                    <button type="submit" class="btn btn-cadastrar">Cadastrar</button>
                </div>

            </form>
        </div>
    </div>
</body>
</html>
