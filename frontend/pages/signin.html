<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Atividades</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/signin-page.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Acessar conta</h2>
        </div>
        <div class="content">
            <form class="form" method="post" action="">
                <label for="username">Nome de Usuário</label>
                <input type="text" id="username" name="username">

                <label for="signin">Senha</label>
                <input type="password" id="password" name="password">
                
                <div class="button-group">
                    <button type="submit" class="btn btn-signup">Cadastrar</button>
                    <button type="submit" class="btn btn-signin">Entrar</button>
                </div>

            </form>
        </div>
    </div>
</body>
</html>
